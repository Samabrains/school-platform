name: Deploy school-platform

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-school-platform
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Checkout core-school-template (for migration bundle)
        uses: actions/checkout@v4
        with:
          repository: Samabrains/core-school-template
          path: core-school-template
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Bundle tenant D1 migrations
        run: TEMPLATE_ROOT=./core-school-template node scripts/bundle-tenant-migrations.mjs

      - name: Apply platform D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply samabrains-platform-d1 --remote

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
